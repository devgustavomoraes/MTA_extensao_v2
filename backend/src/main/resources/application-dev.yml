# Perfil dev — IntelliJ / local / TiDB Cloud
# ddl-auto: update cria/atualiza as tabelas automaticamente no cluster

spring:
  config:
    import: optional:classpath:application-admins.yml
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.projetomta: INFO
    org.hibernate.SQL: DEBUG
