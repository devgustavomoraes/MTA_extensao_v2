# Configuração base — perfis: dev (TiDB local) | prod (Render+TiDB) | test (H2, automático nos testes)
# Variáveis documentadas em: integrações_faltantes.md e backend/.env.example

spring:
  application:
    name: projeto-mta
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
    group:
      dev:
        - dev
        - local
  datasource:
    url: ${DB_JDBC_URL:jdbc:mysql://gateway01.us-east-1.prod.aws.tidbcloud.com:4000/projeto_mta?sslMode=VERIFY_IDENTITY&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=30000}
    username: ${DB_USERNAME:3sWEwpxa2TYs1mn.root}
    password: ${DB_PASSWORD:f6R5QIaYrHALBO2c}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: projeto-mta-pool
      # TiDB Cloud gratuito: manter pool pequeno (1 instância Render ≈ 5 conexões)
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
      keepalive-time: ${DB_POOL_KEEPALIVE:120000}
      validation-timeout: 5000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/plain
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:50}

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    db:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:changeme-local-dev-only-min-32-chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  security:
    login-max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    login-lock-duration-min: ${LOGIN_LOCK_DURATION_MIN:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:3000}
  expiracao:
    retencao-dias: ${EXPIRACAO_RETENCAO_DIAS:7}
    limpeza-cron: ${EXPIRACAO_LIMPEZA_CRON:0 0 * * * *}
