# Referência de deploy no Render (plano gratuito)
# Documentação completa: integrações_faltantes.md

services:
  - type: web
    name: projeto-mta-api
    runtime: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_POOL_MAX_SIZE
        value: "5"
      - key: DB_POOL_MIN_IDLE
        value: "1"
